# Deploy a lab service to the kind cluster. Runs on a SELF-HOSTED runner on the demo machine
# (it needs the local docker + the `kind-sre-lab` kube context). Triggered manually (or by the
# agent's rollback twin / the dashboard) via workflow_dispatch.
#
# The `broken` input is the CI/CD demo lever: a "broken" deploy ships the same image with
# CHAOS_ON_BOOT=errors, so the service comes up faulty — the agent detects the error spike,
# correlation attributes it to this deploy (coincidence in the change feed), and proposes a
# rollback. A normal deploy clears CHAOS_ON_BOOT (a healthy ship).
#
# Steps run in PowerShell — the native shell on the Windows self-hosted runner (avoids the
# `bash` -> WSL resolution trap). The image tag is built once as a job-level expression env var.
name: deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: lab service to deploy
        type: choice
        default: api
        options: [api, webapp, auth, payments, worker]
      broken:
        description: ship a broken build (CHAOS_ON_BOOT=errors)
        type: boolean
        default: false

concurrency: deploy-${{ github.event.inputs.service }}

jobs:
  deploy:
    runs-on: self-hosted   # the demo machine running the kind-sre-lab cluster
    defaults:
      run:
        # -ExecutionPolicy Bypass: the runner's default policy is Restricted, which blocks the
        # generated .ps1 — bypass it per-invocation (no machine-wide policy change needed).
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
    env:
      SERVICE: ${{ github.event.inputs.service }}
      KCTX: kind-sre-lab
      CLUSTER: sre-lab
      IMG: sre-lab-${{ github.event.inputs.service }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — runner has the lab tooling + cluster
        run: |
          foreach ($t in 'docker','kind','kubectl') {
            if (-not (Get-Command $t -ErrorAction SilentlyContinue)) {
              Write-Host "::error::'$t' is not on the runner PATH"; exit 1
            }
          }
          # the kind-sre-lab context lives in the cluster-creator's kubeconfig; the runner may run
          # as a different account, so regenerate it from the running cluster (kind reads docker).
          kind export kubeconfig --name $env:CLUSTER
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::kind export kubeconfig failed — is cluster '$env:CLUSTER' up and docker reachable from the runner?"; exit 1 }
          kubectl --context $env:KCTX -n lab get ns lab | Out-Null
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::cannot reach $env:KCTX / namespace lab from the runner"; exit 1 }
          Write-Host "preflight ok: docker, kind, kubectl reachable; cluster up"

      - name: Build image tagged with the commit SHA
        run: |
          docker build -t $env:IMG ("services/" + $env:SERVICE)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Load the image into kind
        run: |
          kind load docker-image $env:IMG --name $env:CLUSTER
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Set CHAOS_ON_BOOT (broken deploy lever)
        run: |
          $val = if ('${{ github.event.inputs.broken }}' -eq 'true') { 'CHAOS_ON_BOOT=errors' } else { 'CHAOS_ON_BOOT=' }
          kubectl --context $env:KCTX -n lab set env ("deploy/" + $env:SERVICE) $val
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Roll the deployment to the new image
        run: |
          kubectl --context $env:KCTX -n lab set image ("deploy/" + $env:SERVICE) ($env:SERVICE + "=" + $env:IMG)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Wait for rollout
        run: |
          kubectl --context $env:KCTX -n lab rollout status ("deploy/" + $env:SERVICE) --timeout=120s
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Summary
        run: Add-Content $env:GITHUB_STEP_SUMMARY ("deployed " + $env:SERVICE + " @ " + "${{ github.sha }}" + " (broken=${{ github.event.inputs.broken }})")
