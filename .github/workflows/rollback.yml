# Roll a lab service back to a previous known-good build — the cure half of the bad-deploy beat.
# The SRE agent invokes this (Tier-2, after human approval) when it attributes an incident to a
# recent deploy: "CI/CD as ActionBackend" (VISION). Also runnable manually. Self-hosted runner.
#
# With `to_sha` set, it redeploys that image tag and clears the broken-deploy lever; left empty,
# it does a `kubectl rollout undo` (back one revision). Either way CHAOS_ON_BOOT is cleared, so
# the rolled-back service comes up healthy. Steps run in PowerShell (native Windows runner shell).
name: rollback

on:
  workflow_dispatch:
    inputs:
      service:
        description: lab service to roll back
        type: choice
        default: api
        options: [api, webapp, auth, payments, worker]
      to_sha:
        description: image SHA to roll back to (blank = previous revision via rollout undo)
        type: string
        default: ""

concurrency: deploy-${{ github.event.inputs.service }}   # serialise with deploy.yml

jobs:
  rollback:
    runs-on: self-hosted   # the demo machine running the kind-sre-lab cluster
    defaults:
      run:
        # -ExecutionPolicy Bypass: the runner's default policy is Restricted, which blocks the
        # generated .ps1 — bypass it per-invocation (no machine-wide policy change needed).
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
    env:
      SERVICE: ${{ github.event.inputs.service }}
      TO_SHA: ${{ github.event.inputs.to_sha }}
      KCTX: kind-sre-lab
      CLUSTER: sre-lab
    steps:
      - name: Preflight — runner can reach the cluster
        run: |
          foreach ($t in 'kind','kubectl') {
            if (-not (Get-Command $t -ErrorAction SilentlyContinue)) {
              Write-Host "::error::'$t' is not on the runner PATH"; exit 1
            }
          }
          # regenerate the kind-sre-lab context into the runner's kubeconfig from the live cluster
          kind export kubeconfig --name $env:CLUSTER
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::kind export kubeconfig failed - is cluster '$env:CLUSTER' up and docker reachable from the runner?"; exit 1 }
          kubectl --context $env:KCTX -n lab get ns lab | Out-Null
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::cannot reach $env:KCTX / namespace lab from the runner"; exit 1 }
          Write-Host "preflight ok"

      - name: Clear the broken-deploy lever
        run: |
          kubectl --context $env:KCTX -n lab set env ("deploy/" + $env:SERVICE) "CHAOS_ON_BOOT="
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Roll back
        run: |
          if ($env:TO_SHA) {
            $img = "sre-lab-" + $env:SERVICE + ":" + $env:TO_SHA
            Write-Host ("redeploying " + $env:SERVICE + " -> " + $img)
            kubectl --context $env:KCTX -n lab set image ("deploy/" + $env:SERVICE) ($env:SERVICE + "=" + $img)
          } else {
            Write-Host ("rolling back " + $env:SERVICE + " one revision")
            kubectl --context $env:KCTX -n lab rollout undo ("deploy/" + $env:SERVICE)
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Wait for rollout
        run: |
          kubectl --context $env:KCTX -n lab rollout status ("deploy/" + $env:SERVICE) --timeout=120s
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Summary
        run: |
          $to = if ($env:TO_SHA) { $env:TO_SHA } else { "previous revision" }
          Add-Content $env:GITHUB_STEP_SUMMARY ("rolled back " + $env:SERVICE + " to " + $to)
