  namespace: lab
  labels: {app: loadgen, tier: app}
spec:
  replicas: 1
  selector: {matchLabels: {app: loadgen}}
  template:
    metadata:
      labels: {app: loadgen, tier: app}
    spec:
      containers:
        - name: loadgen
          image: sre-lab-loadgen:dev
          imagePullPolicy: IfNotPresent
          env:
            - {name: TARGET_URL, value: "http://gateway:80"}
            - {name: BASE_RPS, value: "4"}
