# ---- worker (no inbound HTTP; exposes /metrics on 5000 for Prometheus) ------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: lab
  labels: {app: worker, tier: app}
spec:
  replicas: 1
  selector: {matchLabels: {app: worker}}
  template:
    metadata:
      labels: {app: worker, tier: app}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: sre-lab-worker:dev
          imagePullPolicy: IfNotPresent
          env:
            - {name: SERVICE_NAME, value: worker}
            - {name: REDIS_HOST, value: redis}
            - {name: DB_HOST, value: postgres}
            - {name: DB_USER, value: demo}
            - {name: DB_PASSWORD, value: demo}
            - {name: DB_NAME, value: demo}
            - {name: PAYMENTS_URL, value: "http://payments:5000"}
            - {name: OTEL_ENABLED, value: "1"}
            - {name: OTEL_SERVICE_NAME, value: worker}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector:4318"}
            - {name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf"}
            - {name: OTEL_TRACES_EXPORTER, value: otlp}
            - {name: OTEL_METRICS_EXPORTER, value: none}
            - {name: OTEL_LOGS_EXPORTER, value: none}
          ports: [{name: metrics, containerPort: 5000}]
          readinessProbe:
            tcpSocket: {port: 5000}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: lab
spec:
  selector: {app: worker}
  ports: [{name: metrics, port: 5000, targetPort: 5000}]
---
