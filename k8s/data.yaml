# Stateful dependencies: postgres + redis. Ephemeral (emptyDir) — this is a demo lab, not a
# system of record, and a fresh DB is re-seeded from the db-init ConfigMap on each pod start.
# These are the two services the agent treats as Tier-2 (approval) for restart (invariant #4).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: lab
  labels: {app: postgres, tier: data}
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  strategy: {type: Recreate}
  template:
    metadata:
      labels: {app: postgres, tier: data}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - {name: POSTGRES_USER, value: demo}
            - {name: POSTGRES_PASSWORD, value: demo}
            - {name: POSTGRES_DB, value: demo}
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
          ports:
            - {name: postgres, containerPort: 5432}
          volumeMounts:
            - {name: initdb, mountPath: /docker-entrypoint-initdb.d, readOnly: true}
            - {name: data, mountPath: /var/lib/postgresql/data}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "demo", "-d", "demo"]}
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: initdb
          configMap: {name: db-init}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lab
spec:
  selector: {app: postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: 5432}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lab
  labels: {app: redis, tier: data}
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata:
      labels: {app: redis, tier: data}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - {name: redis, containerPort: 6379}
          readinessProbe:
            tcpSocket: {port: 6379}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lab
spec:
  selector: {app: redis}
  ports:
    - {name: redis, port: 6379, targetPort: 6379}
