# Loki single-binary (filesystem). Serves the lab's JSON logs to the agent's LokiLogSource.
# Config is verbatim from observability/loki-config.yaml. Ephemeral storage (demo). Exposed at
# localhost:3100 via NodePort 30031.
apiVersion: v1
kind: ConfigMap
metadata: {name: loki-conf, namespace: lab}
data:
  config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: loki, namespace: lab, labels: {app: loki, tier: obs}}
spec:
  replicas: 1
  selector: {matchLabels: {app: loki}}
  template:
    metadata: {labels: {app: loki, tier: obs}}
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.1.1
          args: ["-config.file=/etc/loki/config.yaml"]
          ports: [{name: http, containerPort: 3100}]
          volumeMounts:
            - {name: conf, mountPath: /etc/loki, readOnly: true}
            - {name: data, mountPath: /loki}
          readinessProbe:
            httpGet: {path: /ready, port: 3100}
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: conf
          configMap: {name: loki-conf}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: {name: loki, namespace: lab}
spec:
  type: NodePort
  selector: {app: loki}
  ports: [{name: http, port: 3100, targetPort: 3100, nodePort: 30031}]
